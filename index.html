<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 訂單處理系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:40px;max-width:850px;width:100%}
h1{font-size:2.2rem;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.subtitle{text-align:center;color:#666;margin-bottom:8px;font-size:.92rem}
.sort-info{text-align:center;color:#888;font-size:.8rem;margin-bottom:20px;background:#f0f4ff;border-radius:8px;padding:7px 12px;border-left:3px solid #667eea}
.login-box{max-width:360px;margin:0 auto}
.login-box input{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:10px;font-size:1rem;margin-bottom:12px;outline:none;transition:border .3s}
.login-box input:focus{border-color:#667eea}
.login-error{color:#d63031;font-size:.85rem;margin-bottom:10px;display:none}
.upload-area{border:3px dashed #667eea;border-radius:15px;padding:45px 20px;text-align:center;cursor:pointer;transition:all .3s;background:linear-gradient(135deg,rgba(102,126,234,.04),rgba(118,75,162,.04));margin-bottom:16px}
.upload-area:hover,.upload-area.dragover{border-color:#764ba2;background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(118,75,162,.1));transform:translateY(-2px)}
.upload-icon{font-size:3rem;margin-bottom:10px}
.badges{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.badge-pdf{background:#ffeaa7;color:#d63031}.badge-img{background:#dfe6e9;color:#636e72}
#fileInput{display:none}
.file-list{margin-top:16px}
.file-item{background:#f8f9fa;padding:12px 16px;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:.9rem}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .3s;margin-top:16px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(102,126,234,.4)}
.btn:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;color:#667eea;border:2px solid #667eea;margin-top:10px}
.btn-outline:hover{background:#667eea;color:#fff}
.results{margin-top:24px}
.result-item{background:#fff;border-left:4px solid #667eea;padding:16px;border-radius:10px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.result-filename{font-weight:600;color:#333;font-size:.92rem}
.result-badge{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:3px 12px;border-radius:16px;font-size:.78rem;font-weight:600}
.result-badge.error{background:#ff7675}
.order-card{background:#f8f9fa;padding:12px 14px;border-radius:8px;margin-bottom:8px;border-left:3px solid #764ba2;font-size:.85rem}
.order-label{font-weight:600;color:#667eea;min-width:150px;display:inline-block;vertical-align:top;padding-top:5px;font-size:.84rem}
.editable-field{background:#fff;border:1px solid #ddd;border-radius:4px;padding:5px 10px;font-size:.85rem;font-family:inherit;width:calc(100% - 160px);display:inline-block;transition:border .2s}
.editable-field:focus{outline:none;border-color:#667eea;background:#f0f4ff}
.editable-field:hover{border-color:#aaa}
.editable-field.is-empty{background:#fff5e6;border-color:#ffa940}
.editable-field.is-empty:focus{background:#fff;border-color:#667eea}
.editable-field.is-invalid{background:#ffe5e5;border-color:#d63031}
.field-row{margin-bottom:6px}
.ragic-summary{background:#fff7e6;border-left:4px solid #fa8c16;padding:14px 16px;border-radius:10px;margin-top:18px}
.ragic-summary h3{color:#d46b08;font-size:.95rem;margin-bottom:10px}
.ragic-row{background:#fff;padding:8px 12px;border-radius:6px;margin-bottom:6px;font-size:.85rem;display:flex;justify-content:space-between;align-items:center;gap:8px}
.ragic-row.warn{background:#fff1f0;border-left:3px solid #d63031}
.ragic-row .po{font-weight:700;color:#262626}
.ragic-row .meta{color:#666;font-size:.8rem}
.ragic-row .count{background:#f0f4ff;color:#667eea;padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:600}
.ragic-warn-text{color:#d63031;font-size:.82rem;margin-top:8px}
.loading{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.5);border-radius:50%;border-top-color:#fff;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="container">
  <h1>📄 OCR 訂單處理系統</h1>
  <p class="subtitle">支援 PDF + 圖片 ｜ 一般訂單 & 合約品項自動辨識 ｜ 多品項自動拆分</p>

  <div id="loginSection" class="hidden">
    <div class="login-box" style="margin-top:30px">
      <h3 style="text-align:center;color:#667eea;margin-bottom:16px">🔒 請輸入密碼</h3>
      <input type="password" id="passwordInput" placeholder="密碼" autocomplete="off">
      <div class="login-error" id="loginError"></div>
      <button class="btn" id="loginBtn" onclick="doLogin()">登入</button>
    </div>
  </div>

  <div id="mainSection" class="hidden">
    <div class="sort-info">
      📋 <b>處理順序：</b>PDF 依頁面順序 ｜ 多檔案依檔名自然排序 (1 &lt; 2 &lt; 10)
    </div>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📤</div>
      <h3 style="color:#667eea;font-weight:600">拖放檔案到這裡，或點擊選擇</h3>
      <p style="color:#999;font-size:.85rem;margin-top:4px">最多 20 個檔案，單檔上限 20MB</p>
      <div class="badges">
        <span class="badge badge-pdf">📑 PDF</span>
        <span class="badge badge-img">🖼 JPG</span>
        <span class="badge badge-img">🖼 PNG</span>
        <span class="badge badge-img">🖼 WEBP</span>
        <span class="badge badge-img">🖼 BMP</span>
      </div>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*,.pdf">

    <div class="file-list" id="fileList"></div>
    <button class="btn" id="previewBtn" disabled>📋 預覽辨識結果</button>
    <button class="btn btn-outline hidden" id="submitBtn">✅ 確認寫入 Google Sheet + Ragic</button>

    <div class="results" id="results"></div>
    <div id="ragicSummary"></div>
    <!-- 共用客戶清單，給所有 ragic_customer_code 輸入框搜尋 -->
    <datalist id="customersDatalist"></datalist>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let selectedFiles = [], pendingOrders = [];
let customerList = [];  // Ragic 客戶清單 [{code, name, short_name, category}]
// Ragic 寫入必填：ragic_po + date + ragic_customer_code (客戶編號)
const REQUIRED_FOR_RAGIC = ['ragic_po', 'date', 'ragic_customer_code'];

// 欄位中文對照表
const FIELD_LABELS = {
  ragic_po:           '🟧 Ragic 訂單編號 (手動填)',
  ragic_customer_code:'🟦 Ragic 客戶 (下拉選)',
  hospital:           '客戶名稱(醫院)',
  date:         '訂購日期',
  deadline:     '交貨期限/預計到貨日',
  vendor:       '廠商名稱',
  loc:          '交貨地點',
  type:         '訂單類型',
  material_id:  '資材代碼',
  item:         '品名',
  brand:        '廠牌型號',
  qty:          '訂購量/數量',
  unit:         '單位',
  price:        '單價',
  total:        '訂購總金額',
  dept:         '請購部門',
  user:         '申購人',
  ext:          '分機/聯絡分機',
  po_no:        '訂單號碼/訂購單號',
  item_id:      '訂單編號-項次',
  idx:          '項次',
  sign_no:      '簽辦案號',
  order_total:  '總金額',
  note:         '備註',
  warranty:     '保固月數',
};

// 預覽時顯示的欄位順序 (Ragic 寫入用欄位放最前面)
const DISPLAY_FIELDS = [
  'ragic_po','ragic_customer_code',
  'hospital','date','deadline','vendor','loc','type','material_id',
  'item','brand','qty','unit','price','total',
  'dept','user','ext',
  'po_no','item_id','sign_no','order_total',
  'note','warranty'
];

async function checkAuth() {
  try {
    const r = await fetch('/auth/status');
    const d = await r.json();
    if (!d.required || d.authenticated) { showMain(); return; }
    $('loginSection').classList.remove('hidden');
    $('passwordInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  } catch(e) { showMain(); }
}
async function doLogin() {
  const pw = $('passwordInput').value;
  if (!pw) return;
  const r = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw})});
  if (r.ok) { $('loginSection').classList.add('hidden'); showMain(); }
  else { $('loginError').textContent='密碼錯誤'; $('loginError').style.display='block'; }
}
function showMain() {
  $('mainSection').classList.remove('hidden');
  loadCustomers();
}

async function loadCustomers() {
  try {
    const r = await fetch('/ragic/customers');
    if (!r.ok) return;
    const d = await r.json();
    customerList = d.customers || [];
    populateCustomerDatalist();
    console.log(`Loaded ${customerList.length} Ragic customers`);
  } catch(e) {
    console.warn('載入客戶清單失敗:', e);
  }
}

// 客戶顯示字串格式：「35 林新醫院 (醫院)」— 編號開頭方便解析、簡稱+類別方便搜尋
function customerDisplay(c) {
  return `${c.code} ${c.short_name || c.name} (${c.category || '?'})`;
}

// 從 input 字串開頭取客戶編號 (例如「35 林新醫院 (醫院)」→「35」)
function parseCustomerCode(text) {
  if (!text) return '';
  const m = String(text).trim().match(/^(\S+)/);
  return m ? m[1] : '';
}

function populateCustomerDatalist() {
  const dl = $('customersDatalist');
  if (!dl) return;
  dl.innerHTML = customerList.map(c => {
    const v = customerDisplay(c).replace(/"/g,'&quot;');
    return `<option value="${v}">`;
  }).join('');
}

// 模糊比對單一字串 → 客戶清單，找最匹配的客戶編號 (空字串=找不到)
function matchCustomerByText(text) {
  if (!text || !customerList.length) return '';
  const t = String(text).trim();
  if (!t) return '';
  // 1. 完整名稱完全相等
  let m = customerList.find(c => c.name === t);
  if (m) return m.code;
  // 2. 簡稱完全相等
  m = customerList.find(c => c.short_name === t);
  if (m) return m.code;
  // 3. 輸入字串包含簡稱 (例如「3F 麻醉科 林新醫院」包含「林新醫院」)
  m = customerList.find(c => c.short_name && t.includes(c.short_name));
  if (m) return m.code;
  // 4. 輸入字串包含完整名稱
  m = customerList.find(c => c.name && t.includes(c.name));
  if (m) return m.code;
  // 5. 客戶簡稱包含輸入字串 (輸入較短時)
  m = customerList.find(c => c.short_name && c.short_name.includes(t));
  if (m) return m.code;
  return '';
}

// 根據 OCR 結果猜客戶編號：loc (交貨地點) 優先，找不到才用 hospital fallback
function guessCustomerCode(order) {
  if (!order) return '';
  return matchCustomerByText(order.loc) || matchCustomerByText(order.hospital);
}

function findCustomer(code) {
  return customerList.find(c => c.code === code);
}

$('uploadArea').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', e => handleFiles(e.target.files));
$('uploadArea').addEventListener('dragover', e => { e.preventDefault(); $('uploadArea').classList.add('dragover'); });
$('uploadArea').addEventListener('dragleave', () => $('uploadArea').classList.remove('dragover'));
$('uploadArea').addEventListener('drop', e => { e.preventDefault(); $('uploadArea').classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

function naturalSort(a, b) {
  const re=/(\d+)/g, ap=a.name.toLowerCase().split(re), bp=b.name.toLowerCase().split(re);
  for(let i=0;i<Math.max(ap.length,bp.length);i++){
    const av=ap[i]||'',bv=bp[i]||'',an=parseInt(av),bn=parseInt(bv);
    if(!isNaN(an)&&!isNaN(bn)&&an!==bn)return an-bn;
    if(av!==bv)return av<bv?-1:1;
  }
  return 0;
}

function handleFiles(files) {
  let arr = Array.from(files);
  if(arr.length>20){alert('最多 20 個檔案');arr=arr.slice(0,20);}
  selectedFiles = arr.sort(naturalSort);
  pendingOrders = [];
  $('submitBtn').classList.add('hidden');
  $('results').innerHTML = '';
  renderFileList();
  $('previewBtn').disabled = !selectedFiles.length;
}

function renderFileList() {
  $('fileList').innerHTML = '';
  selectedFiles.forEach(f => {
    const isPDF = f.name.toLowerCase().endsWith('.pdf');
    $('fileList').innerHTML += `<div class="file-item"><span><b>${isPDF?'📑':'🖼'} ${f.name}</b><span style="color:#999;font-size:.78rem;margin-left:6px">${isPDF?'PDF':'圖片'} · ${(f.size/1024).toFixed(0)}KB</span></span><span style="color:#b8860b;font-size:.8rem">待處理</span></div>`;
  });
}

$('previewBtn').addEventListener('click', async () => {
  if(!selectedFiles.length) return;
  $('previewBtn').disabled=true;
  $('previewBtn').innerHTML='<span class="loading"></span>OCR 辨識中...';
  $('results').innerHTML='';
  pendingOrders=[];

  const fd = new FormData();
  selectedFiles.forEach(f=>fd.append('files',f));

  try {
    const r = await fetch('/preview',{method:'POST',body:fd});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    displayResults(d.results, true);
  } catch(e) { alert('處理失敗: '+e.message); }
  finally { $('previewBtn').disabled=false; $('previewBtn').textContent='📋 預覽辨識結果'; }
});

function collectEdits() {
  document.querySelectorAll('.editable-field').forEach(input => {
    const idx = parseInt(input.dataset.orderIdx);
    const field = input.dataset.field;
    const val = input.value.trim();
    if (!pendingOrders[idx]) return;

    if (field === 'ragic_customer_code') {
      // 從顯示字串「35 林新醫院 (醫院)」解析出客戶編號
      const code = parseCustomerCode(val);
      const customer = findCustomer(code);
      pendingOrders[idx].ragic_customer_code = customer ? code : '';
      pendingOrders[idx].ragic_customer_category = customer ? customer.category : '';
    } else if (['qty', 'price', 'total', 'order_total', 'warranty'].includes(field)) {
      pendingOrders[idx][field] = val ? parseFloat(val) || 0 : 0;
    } else {
      pendingOrders[idx][field] = val;
    }
  });
}

function validateRequired() {
  // 清掉舊的紅框
  document.querySelectorAll('.editable-field.is-invalid').forEach(el => el.classList.remove('is-invalid'));
  const missing = [];
  document.querySelectorAll('.editable-field').forEach(input => {
    const field = input.dataset.field;
    if (!REQUIRED_FOR_RAGIC.includes(field)) return;
    const val = String(input.value).trim();
    let invalid = false;
    if (field === 'ragic_customer_code') {
      // 必須能對應到客戶清單，不只是非空字串
      const code = parseCustomerCode(val);
      if (!findCustomer(code)) invalid = true;
    } else {
      if (!val) invalid = true;
    }
    if (invalid) {
      input.classList.add('is-invalid');
      missing.push({field, input});
    }
  });
  return missing;
}

function renderRagicSummary() {
  const box = $('ragicSummary');
  if (!pendingOrders.length) { box.innerHTML = ''; return; }
  // 用 po_no 分組 (OCR 穩定識別)，主表訂單編號 (1000320) 從每組第一個有值的 ragic_po 取
  const groups = {};
  pendingOrders.forEach(o => {
    const po = (o.po_no || '').trim();
    if (!po) return;
    (groups[po] = groups[po] || []).push(o);
  });
  const poList = Object.keys(groups);
  const noPo = pendingOrders.filter(o => !(o.po_no || '').trim()).length;
  if (!poList.length && !noPo) { box.innerHTML = ''; return; }

  let html = `<div class="ragic-summary"><h3>📋 將寫入 Ragic 的訂單 (按 po_no 分組)</h3>`;
  poList.forEach(po => {
    const items = groups[po];
    const h = items[0];
    const ragicPo = (items.find(it => (it.ragic_po || '').trim())?.ragic_po || '').trim();
    const custCode = (items.find(it => (it.ragic_customer_code || '').trim())?.ragic_customer_code || '').trim();
    const custObj = findCustomer(custCode);

    const ragicPoDisplay = ragicPo
      ? `<span class="po">${ragicPo}</span>`
      : `<span style="color:#d63031">⚠ 未填 Ragic 訂單編號</span>`;
    const dateBad = !h.date ? ' <span style="color:#d63031">(缺日期)</span>' : '';

    let custLine;
    if (custObj) {
      const taxPct = custObj.category === '醫院' ? '0%' : '5%';
      custLine = `客戶：<b>${custCode}</b> ${custObj.short_name || custObj.name} (${custObj.category}) · 營業稅 <b>${taxPct}</b>`;
    } else if (custCode) {
      custLine = `<span style="color:#d63031">⚠ 客戶清單找不到 "${custCode}"，連結會以純文字存，營業稅 5%</span>`;
    } else {
      custLine = `<span style="color:#d63031">⚠ 未選客戶</span>`;
    }

    html += `<div class="ragic-row">
      <div>
        <div>${ragicPoDisplay} <span class="meta">(po_no: ${po})</span>${dateBad}</div>
        <div class="meta">${h.date || '？'} ｜ ${h.vendor || '—'}</div>
        <div class="meta">${custLine}</div>
      </div>
      <span class="count">${items.length} 個品項</span>
    </div>`;
  });
  if (noPo) {
    html += `<div class="ragic-row warn"><div>⚠️ 有 ${noPo} 筆品項 OCR 沒抓到 po_no</div><span class="meta">將跳過 Ragic，仍寫入 Sheet</span></div>`;
  }
  html += `<div class="ragic-warn-text">寫入規則：同 po_no 合併為一筆 Ragic 訂單；訂單編號用「Ragic 訂單編號」；客戶編號用下拉選的客戶；營業稅依客戶類別 (醫院 0%、其他 5%)；已存在的訂單編號會自動跳過。</div></div>`;
  box.innerHTML = html;
}

function formatRagicResultMsg(d) {
  let msg = `✅ Google Sheet: 已寫入 ${d.rows_written} 行\n\n`;
  if (!d.ragic) { msg += '📋 Ragic: 未啟用'; return msg; }
  if (!d.ragic.enabled) { msg += '📋 Ragic: 已停用 (RAGIC_ENABLED=false)'; return msg; }
  if (!d.ragic.configured) { msg += '📋 Ragic: 未設定 API Key，已跳過'; return msg; }
  const s = d.ragic.summary;
  msg += `📋 Ragic 結果：新增 ${s.success} 筆、跳過 ${s.skipped} 筆、失敗 ${s.error} 筆`;
  if (s.no_po) msg += `\n   (有 ${s.no_po} 筆品項缺訂單號，未送 Ragic)`;
  if (d.ragic.results && d.ragic.results.length) {
    const lines = d.ragic.results.map(r => {
      const tag = r.status === 'success' ? '✓' : (r.status === 'skipped' ? '○' : '✗');
      const extra = r.message ? ` — ${r.message}` : '';
      return `   ${tag} ${r.po_no} (${r.items} 品項)${extra}`;
    });
    msg += '\n' + lines.join('\n');
  }
  return msg;
}

$('submitBtn').addEventListener('click', async () => {
  if(!pendingOrders.length) return;

  collectEdits();
  renderRagicSummary();

  const missing = validateRequired();
  if (missing.length) {
    alert(`還有 ${missing.length} 個必填欄位沒填，已用紅框標出。\n\nRagic 主表必填：\n• 🟧 Ragic 訂單編號 (手動填)\n• 🟦 Ragic 客戶 (下拉選)\n• 訂購日期`);
    const first = missing[0].input;
    first.scrollIntoView({behavior:'smooth', block:'center'});
    first.focus();
    return;
  }

  $('submitBtn').disabled=true;
  $('submitBtn').innerHTML='<span class="loading"></span>寫入中...';
  try {
    const r = await fetch('/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orders:pendingOrders})});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    alert(formatRagicResultMsg(d));
    $('submitBtn').classList.add('hidden');
    $('ragicSummary').innerHTML = '';
    pendingOrders=[];
  } catch(e) { alert('寫入失敗: '+e.message); }
  finally { $('submitBtn').disabled=false; $('submitBtn').textContent='✅ 確認寫入 Google Sheet + Ragic'; }
});

function displayResults(resultsData, showSubmit) {
  const el = $('results');
  el.innerHTML = '<h2 style="color:#667eea;margin-bottom:16px">📊 辨識結果（可直接點擊修改）</h2>';

  let globalIdx = 0;
  resultsData.forEach(r => {
    const div = document.createElement('div');
    div.className = 'result-item';

    if(r.status!=='success'){
      div.innerHTML = `<div class="result-header"><span class="result-filename">❌ ${r.filename}</span><span class="result-badge error">失敗</span></div><div style="color:#d63031;font-size:.88rem">${r.message}</div>`;
    } else {
      const orders = r.orders||[];
      // 初始化新欄位：ragic_po 預設空、ragic_customer_code 預設用 hospital 模糊匹配
      orders.forEach(o => {
        if (o.ragic_po === undefined) o.ragic_po = '';
        if (o.ragic_customer_code === undefined) {
          o.ragic_customer_code = guessCustomerCode(o);
        }
        const c = findCustomer(o.ragic_customer_code);
        o.ragic_customer_category = c ? c.category : '';
      });
      pendingOrders.push(...orders);

      let ordersHTML = '';
      orders.forEach((o,i)=>{
        ordersHTML += `<div class="order-card">
          <div style="font-weight:700;color:#764ba2;margin-bottom:8px">品項 ${i+1}: ${o.item||'—'}</div>`;

        DISPLAY_FIELDS.forEach(k => {
          const val = (o[k] !== undefined && o[k] !== null) ? o[k] : '';
          const isEmpty = (val === '' || val === 0 || val === '0');
          const label = FIELD_LABELS[k] || k;

          if (k === 'ragic_customer_code') {
            // 客戶可搜尋輸入：input + datalist，使用者可打「林新」或「35」過濾
            const curCode = String(val);
            const matched = findCustomer(curCode);
            const inputVal = matched ? customerDisplay(matched) : curCode;
            const taxHint = matched
              ? `<span style="color:#666;font-size:.78rem;margin-left:8px">→ 類別 ${matched.category}，營業稅 ${matched.category==='醫院'?'0%':'5%'}</span>`
              : (curCode ? `<span style="color:#d63031;font-size:.78rem;margin-left:8px">⚠ 找不到客戶 "${curCode}"</span>` : '');
            const inputCls = (!matched ? 'is-empty' : '');
            ordersHTML += `<div class="field-row">
              <span class="order-label">${label}:</span>
              <input type="text" class="editable-field ${inputCls}"
                     list="customersDatalist"
                     value="${String(inputVal).replace(/"/g,'&quot;')}"
                     data-order-idx="${globalIdx}" data-field="${k}"
                     placeholder="輸入編號 / 簡稱 / 名稱搜尋 (例: 林新、35)">
              ${taxHint}
            </div>`;
          } else {
            ordersHTML += `<div class="field-row">
              <span class="order-label">${label}:</span>
              <input type="text" class="editable-field${isEmpty ? ' is-empty' : ''}"
                     value="${String(val).replace(/"/g,'&quot;')}"
                     data-order-idx="${globalIdx}" data-field="${k}"
                     ${isEmpty ? 'placeholder="（未抓到，請補）"' : ''}>
            </div>`;
          }
        });

        ordersHTML += `</div>`;
        globalIdx++;
      });

      div.innerHTML = `<div class="result-header"><span class="result-filename">✅ ${r.filename}</span><span class="result-badge">${r.items_count} 品項</span></div>${ordersHTML}`;
    }
    el.appendChild(div);
  });

  if(showSubmit && pendingOrders.length) {
    $('submitBtn').classList.remove('hidden');
    $('submitBtn').textContent = `✅ 確認寫入 ${pendingOrders.length} 筆 (Google Sheet + Ragic)`;
  }

  // 編輯到會影響 Ragic 摘要的欄位時自動重算
  const watchFields = new Set(['po_no','date','vendor','loc','ragic_po','ragic_customer_code']);
  document.querySelectorAll('.editable-field').forEach(input => {
    input.addEventListener('input', () => {
      const field = input.dataset.field;
      const idx = parseInt(input.dataset.orderIdx);
      const myPo = (pendingOrders[idx]?.po_no || '').trim();
      const newVal = input.value;

      // ragic_po / ragic_customer_code: 同 po_no 群組內自動同步
      if ((field === 'ragic_po' || field === 'ragic_customer_code') && myPo) {
        document.querySelectorAll(`.editable-field[data-field="${field}"]`).forEach(other => {
          if (other === input) return;
          const otherIdx = parseInt(other.dataset.orderIdx);
          const otherPo = (pendingOrders[otherIdx]?.po_no || '').trim();
          if (otherPo === myPo && other.value !== newVal) {
            other.value = newVal;
            if (String(newVal).trim()) other.classList.remove('is-empty', 'is-invalid');
            else other.classList.add('is-empty');
          }
        });
      }

      // ragic_customer_code: 解析顯示字串成編號 + 自動更新對應的 ragic_customer_category
      if (field === 'ragic_customer_code') {
        const code = parseCustomerCode(newVal);
        const matched = findCustomer(code);
        const newCat = matched ? matched.category : '';
        pendingOrders[idx].ragic_customer_code = matched ? code : '';
        pendingOrders[idx].ragic_customer_category = newCat;
        // 同 po_no 群組同步 (pendingOrders 中存編號，DOM 中存顯示字串)
        if (myPo) {
          pendingOrders.forEach((o, i) => {
            if (i !== idx && (o.po_no || '').trim() === myPo) {
              o.ragic_customer_code = matched ? code : '';
              o.ragic_customer_category = newCat;
            }
          });
        }
      }

      if (!watchFields.has(field)) return;
      collectEdits();
      renderRagicSummary();
    });
    input.addEventListener('blur', () => {
      if (REQUIRED_FOR_RAGIC.includes(input.dataset.field) && String(input.value).trim()) {
        input.classList.remove('is-invalid');
      }
    });
  });

  collectEdits();
  renderRagicSummary();
}

checkAuth();
</script>
